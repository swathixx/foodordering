# Server Port Configuration
server.port=8081

# Application Name
spring.application.name=order-service

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/order_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&nullCatalogMeansCurrent=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ActiveMQ Configuration
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin

# Camunda Configuration
camunda.bpm.database.schema-update=true
camunda.bpm.job-execution.enabled=true
camunda.bpm.webapp.index-redirect-enabled=true
camunda.bpm.generic-properties.properties.skip-isolation-level-check=true

# Deploy BPMN files automatically
camunda.bpm.deployment-resource-pattern=classpath*:**/*.bpmn

# Queue
order.created.queue.name=order.created

# Error Details
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always