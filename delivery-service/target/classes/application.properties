# Server Port Configuration
server.port=8084

# Application Name
spring.application.name=delivery-service

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/delivery_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&nullCatalogMeansCurrent=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ActiveMQ Configuration
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin

# ActiveMQ Queue Names
delivery.pending.queue.name=delivery.pending
delivery.completed.queue.name=delivery.completed
