# Server Port Configuration
server.port=8083

# Application Name
spring.application.name=kitchen-service

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/kitchen_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&nullCatalogMeansCurrent=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ActiveMQ Configuration
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin

# ActiveMQ Queue Names
kitchen.pending.queue.name=kitchen.pending
kitchen.completed.queue.name=kitchen.completed
payment.completed.queue.name=payment.completed